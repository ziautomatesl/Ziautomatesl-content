name: ZIA Video - Manana 7:00

on:
  schedule:
    - cron: '0 5 * * *'  # 7:00 hora España (UTC+2 verano)
  workflow_dispatch:      # permite lanzarlo manualmente para probar
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publicar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y fonts-dejavu ffmpeg

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar y publicar video
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py morning > debug.txt 2>&1

      - name: Guardar debug si hay error
        if: failure()
        run: |
          git config user.email "actions@github.com"
          git config user.name "ZIA Bot"
          git add debug.txt
          git commit -m "debug output [skip ci]"
          git push
