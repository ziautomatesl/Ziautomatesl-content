name: ZIA Video - Noche 20:30

on:
  schedule:
    - cron: '30 18 * * *'  # 20:30 hora España (UTC+2 verano)
  workflow_dispatch:        # permite lanzarlo manualmente para probar

jobs:
  publicar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y fonts-dejavu ffmpeg

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar y publicar video
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python main.py evening 2>&1 | tee debug.txt; exit ${PIPESTATUS[0]}

      - name: Mostrar log si falla
        if: failure()
        run: cat debug.txt || echo "(sin log)"
