name: ZIA Video - Prime Time

on:
  workflow_dispatch:   # publicación manual únicamente

jobs:
  publicar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: remotion/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('remotion/package.json') }}
          restore-keys: npm-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: remotion-chrome-${{ runner.os }}-v1
      - name: Instalar dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu fonts-noto-core ffmpeg
      - name: Instalar dependencias Python
        run: pip install -r requirements.txt
      - name: Instalar dependencias Remotion
        run: npm install
        working-directory: remotion
      - name: Generar y publicar video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
          IMAGEIO_FFMPEG_EXE: /usr/bin/ffmpeg
        run: python main.py both 2>&1 | tee debug.txt; exit ${PIPESTATUS[0]}
      - name: Mostrar log si falla
        if: failure()
        run: cat debug.txt || echo "(sin log)"
