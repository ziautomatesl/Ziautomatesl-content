name: ZIA Clock — Disparador de precisión

on:
  schedule:
    - cron: '0,30 * * * *'   # cada 30 min
  workflow_dispatch:

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verificar hora España
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          H=$(TZ='Europe/Madrid' date +%-H)
          M=$(TZ='Europe/Madrid' date +%-M)
          echo "Hora Madrid: ${H}:${M} — clock activo (sin disparos de vídeo)"
