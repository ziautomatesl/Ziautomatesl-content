name: ZIA Clock — Disparador de precisión

on:
  schedule:
    - cron: '0,30 * * * *'   # cada 30 min — ligero, sale rápido de cola
  workflow_dispatch:

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Disparar workflow según hora España
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          H=$(TZ='Europe/Madrid' date +%-H)
          M=$(TZ='Europe/Madrid' date +%-M)
          echo "Hora Madrid: ${H}:${M}"

          # Dispara el workflow solo si no hubo run en las últimas 3h
          dispatch_if_not_recent() {
            local workflow=$1
            local label=$2
            local recent
            recent=$(gh api "repos/$REPO/actions/workflows/$workflow/runs?per_page=1" \
              --jq '.workflow_runs[0].created_at // empty' 2>/dev/null || echo "")
            if [ -n "$recent" ]; then
              local age=$(( $(date +%s) - $(date -d "$recent" +%s 2>/dev/null || echo 0) ))
              if [ "$age" -lt 10800 ]; then
                echo "  $label: run reciente hace $((age/60)) min — no disparar"
                return
              fi
            fi
            gh api "repos/$REPO/actions/workflows/$workflow/dispatches" -f ref=main
            echo "  $label: disparado OK"
          }

          # YouTube 17:30 → ventana 17:15–17:59
          if [ "$H" -eq 17 ] && [ "$M" -ge 15 ]; then
            dispatch_if_not_recent "youtube_1730.yml" "YouTube 17:30"
          fi

          # Instagram 18:30 → ventana 18:15–18:59
          if [ "$H" -eq 18 ] && [ "$M" -ge 15 ]; then
            dispatch_if_not_recent "instagram_1830.yml" "Instagram 18:30"
          fi

          # Prime Time 20:00 → ventana 19:45–20:29
          if { [ "$H" -eq 19 ] && [ "$M" -ge 45 ]; } || \
             { [ "$H" -eq 20 ] && [ "$M" -lt 30 ]; }; then
            dispatch_if_not_recent "primetime_2000.yml" "Prime Time 20:00"
          fi
