name: Setup Instagram Session (ejecutar una vez)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar instagrapi
        run: pip install instagrapi

      - name: Generar sesión Instagram
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
        run: |
          python3 - <<'EOF'
          import os, json, base64
          from instagrapi import Client

          username = os.environ["INSTAGRAM_USERNAME"]
          password = os.environ["INSTAGRAM_PASSWORD"]

          print(f"Haciendo login con @{username} ...")
          cl = Client()
          cl.delay_range = [2, 5]
          cl.login(username, password)

          session = cl.get_settings()
          encoded = base64.b64encode(json.dumps(session).encode()).decode()
          print("Sesión generada correctamente.")
          print(f"INSTAGRAM_SESSION_VALUE={encoded}")
          EOF
